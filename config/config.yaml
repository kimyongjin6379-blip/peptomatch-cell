data:
  composition_file: "data/composition_template.xlsx"
  composition_sheet: "data"

# Sempio products only
peptone_filter:
  - SOY-1
  - SOY-N+
  - SOY-L
  - SOY-P
  - SOY-BIO
  - SOY-BIO N50
  - WHEAT-1
  - WHEAT-BIO
  - PEA-1
  - PEA-BIO
  - RICE-1
  - RICE-BIO
  - Fish Collagen
  - PPR Type2
  - PPR Type3
  - PPR Type4

# Scoring weights (cell-line optimized)
weights:
  essential_aa: 2.0         # cannot be substituted
  conditional_aa: 1.2       # cell-line specific
  non_essential_aa: 0.5     # helpful but not critical
  faa_preference: 1.5       # animal cells prefer free AA
  mw_low: 1.3               # small peptides via PepT transporter
  mw_medium: 0.7            # limited oligopeptide uptake
  mw_high: 0.2              # large peptides need extracellular protease
  vitamin: 0.8              # all B vitamins required externally
  nucleotide: 0.4           # de novo possible, salvage preferred
  orgacid_penalty: -0.3     # excess organic acid → pH issues
  hydrolysis_bonus: 0.5     # higher FAA/TAA → better for animal cells
